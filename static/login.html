<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión - Dental Criss</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        .login-container { background: white; padding: 2.5rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #333; margin-top: 0; margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 2rem; }
        form { display: flex; flex-direction: column; gap: 1rem; }
        input { padding: 0.8rem; border-radius: 4px; border: 1px solid #ccc; font-size: 1rem; }
        button { padding: 0.8rem; background-color: #6a5acd; color: white; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background-color 0.2s; }
        button:hover { background-color: #5948b1; }
        #error-message { color: #dc3545; margin-top: 1rem; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Dental Criss</h1>
        <p>Acceso de Administrador</p>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Usuario" required autocomplete="username" />
            <input type="password" id="password" placeholder="Contraseña" required autocomplete="current-password" />
            <button type="submit">Ingresar</button>
            

<p style="text-align: center; margin-top: 1rem; font-size: 0.9em;">
    <a href="/app/register.html">Registrar nuevo administrador</a>
</p>
        </form>
        <p id="error-message"></p>

</p>
    </div>

     <script src="/app/login.js"></script>
</body>
</html>
